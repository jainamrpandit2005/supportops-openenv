name: supportops-openenv
version: 1.0.0
description: >
  A real-world customer support operations environment for training and evaluating
  AI agents on ticket triage, routing, escalation, and customer communication.
domain: customer_support
entrypoint: app.server:app

api:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  baseline: /baseline

models:
  observation: app.models.Observation
  action: app.models.Action
  reward: app.models.Reward

tasks:
  - id: easy_billing_refund
    difficulty: easy
    description: Resolve a duplicate billing charge refund request.
  - id: medium_account_lockout
    difficulty: medium
    description: Handle account lockout requiring identity verification and escalation.
  - id: hard_abuse_technical_combo
    difficulty: hard
    description: Triage a potential workspace compromise and abuse incident.

evaluation:
  score_range: [0.0, 1.0]
  deterministic: true

deployment:
  containerized: true
  hf_space_tag: openenv